on:
  pull_request:
    branches: [main, master]


permissions:
  contents: read
  id-token: write


env:
  DBT_PROFILES_DIR: ${{ github.workspace }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  BQ_LOCATION: ${{ vars.BQ_LOCATION }}


jobs:
  dbt-run:
    name: dbt deps + run
    #GitHub spins up a fresh, temporary and isolated VM running on Ubuntu LTS
    runs-on: ubuntu-latest
    steps:

        #Clones repo onto the runner
      - name: Checkout
        uses: actions/checkout@v4

        #Installs the uv package manager
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # Reads pyproject.toml and uv.lock, provisions the python pinned
      # in .python-version and installs the locked dependency versions.
      - name: Install dbt and dependencies
        run: uv sync

      # Authenticates to GCP as the Terraform-provisioned service account.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install dbt packages
        run: uv run dbt deps

        #Checks whether dbt can connect to BigQuery before the build is done
      - name: Verify connection
        run: uv run dbt debug --target ci

      # Runs models and tests
      - name: dbt build
        run: uv run dbt build --target ci
