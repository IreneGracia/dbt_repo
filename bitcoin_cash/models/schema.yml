version: 2

models:
  - name: staging_model
    description: >
      A strict three-month window of raw Bitcoin Cash transactions ending at the
      latest transaction date in the public
      `bigquery-public-data.crypto_bitcoin_cash.transactions` table. Partition-
      pruned on the monthly partition column.
    data_tests:
      # Partition-column integrity: the monthly partition column must match the
      # actual timestamp's month.
      - dbt_utils.expression_is_true:
          expression: "block_timestamp_month = date(timestamp_trunc(block_timestamp, month))"

    #Lists columns that are load-bearing and therefore should be documented or tested
    columns:
      - name: hash
        # `hash` is a reserved keyword in BigQuery, so dbt must quote it
        # when generating test SQL, otherwise the column reference
        # parses as the keyword and fails with "Unexpected keyword HASH"
        quote: true
        description: "Transaction hash. Natural key of a transaction."
        data_tests:
          - unique
          - not_null
      - name: block_timestamp
        description: "Timestamp the transaction's block was mined (UTC)."
        data_tests:
          - not_null
      - name: is_coinbase
        description: "True when this is a coinbase transaction."
        data_tests:
          - not_null

  - name: mart_model
    description: >
      Current balance per address over the staged 3-month window, computed as
      sum(received outputs) - sum(spent inputs). Addresses that ever appeared in a
      coinbase transaction are excluded.
    columns:
      - name: address
        description: "Bitcoin Cash address."
        data_tests:
          - unique
          - not_null
      - name: balance
        description: "Net balance across the staged window."
        data_tests:
          - not_null
