
#Describes how dbt connects to the warehouse: the connection and authentication settings
#per environment

bitcoin_cash:
  outputs:
    dev:

      #Target 1: local environment
      #Authenticates as user's own account
      type: bigquery
      method: oauth
      project: '{{ env_var("DBT_BIGQUERY_PROJECT") }}'
      dataset: '{{ env_var("DBT_BIGQUERY_DATASET") }}'
      location: US
      threads: 4 #How many models dbt runs in parallel
      priority: interactive #Query starts executing immediately, as opposed to batch
      job_execution_timeout_seconds: 300
      job_retries: 1

    #Target 2: the CI pipeline
    #Authenticates as the dbt-runner SA via WIF
    ci:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('DBT_DEFAULT_DATASET', 'staging') }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 600
      job_retries: 1

  #Default target
  target: dev
