bitcoin_cash:
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: '{{ env_var("DBT_BIGQUERY_PROJECT") }}'
      dataset: '{{ env_var("DBT_BIGQUERY_DATASET") }}'
      location: US
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 300
      job_retries: 1

    ci:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('DBT_DEFAULT_DATASET', 'staging') }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 600
      job_retries: 1

  target: dev
